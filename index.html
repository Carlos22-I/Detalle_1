<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🌹 1 Año de Amor - Marita & Carlitos 🌹</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpath fill='%23e6005c' d='M50,88.8 C50,88.8 10,55 10,35 C10,22 20,10 35,10 C45,10 50,18 50,18 C50,18 55,10 65,10 C80,10 90,22 90,35 C90,55 50,88.8 50,88.8 Z'%3E%3C/path%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Overlay para activar la música (desaparece al primer clic) -->
<div id="musicOverlay" class="music-overlay">
    <div class="overlay-heart">
        <i class="fas fa-heart"></i>
        <p>Toca para sentir la magia</p>
        <span class="small-flower">🌹</span>
    </div>
</div>

<!-- Fondos mágicos -->
<div class="bg-roses" id="bgRoses"></div>
<div class="falling-petals" id="fallingPetals"></div>

<!-- Contenedor principal del recuerdo -->
<div class="story-container">
    <div class="story-card">
        <div class="photo-frame" id="photoFrame">
            <div class="glow-effect"></div>
            <!-- Aquí se inyectará dinámicamente img o video -->
            <div id="mediaContainer"></div>
            <div class="overlay-text" id="overlayText"></div>
        </div>
        
        <div class="story-info">
            <div class="badge-anniversary">
                <i class="fas fa-gem"></i> 1 AÑO DE AMOR <i class="fas fa-gem"></i>
            </div>
            <div class="counter" id="timeCounter"></div>
            <div class="signature">Con amor, <br> <strong>tu Carlitos que te ama Mucho</strong> 💕</div>
        </div>
    </div>
</div>

<!-- Audio de fondo oculto -->
<audio id="bgMusic" loop preload="auto">
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script>
<script src="script.js"></script>
</body>
</html>
